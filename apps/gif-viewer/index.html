<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Viewer</title>

    <style>
        body {
            margin: 0;
            padding: 10px;
            background: white;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        .error {
            color: red;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<img id="viewer" alt="GIF Viewer">
<div id="error" class="error"></div>

<script>

const params = new URLSearchParams(window.location.search);

// default jika parameter tidak ada
const file = params.get("file") || "now.gif";

// path menuju folder gif
const gifPath = "../../gif/" + file;

// tampilkan gif
document.getElementById("viewer").src = gifPath;

// jika file tidak ditemukan
document.getElementById("viewer").onerror = function() {
    document.getElementById("error").innerHTML =
        "File tidak ditemukan: " + file;
};

</script>

</body>
</html>

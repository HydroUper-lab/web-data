<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>GSMaP GIF Viewer</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        background: #ffffff;
        font-family: Arial, sans-serif;
        color: #222222;
    }

    .container {
        width: 100%;
        max-width: 100%;
        box-sizing: border-box;
        padding: 10px;
    }

    details {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #cccccc;
        border-radius: 6px;
        margin-bottom: 12px;
        background: #ffffff;
    }

    summary {
        cursor: pointer;
        padding: 12px 14px;
        font-size: 18px;
        font-weight: bold;
        color: #004b8d;
        line-height: 1.4;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
        font-size: 14px;
    }

    th, td {
        border-top: 1px solid #dddddd;
        padding: 8px 10px;
        text-align: left;
        vertical-align: top;
        word-wrap: break-word;
        overflow-wrap: break-word;
    }

    th {
        width: 28%;
        background: #f5f5f5;
        font-weight: bold;
    }

    .gif-wrapper {
        width: 100%;
        text-align: center;
    }

    img {
        display: block;
        width: 100%;
        max-width: 100%;
        height: auto;
        border: 1px solid #dddddd;
        box-sizing: border-box;
    }

    .download-link {
        font-weight: bold;
        color: #0066cc;
        text-decoration: none;
    }

    .download-link:hover {
        text-decoration: underline;
    }

    .error {
        color: red;
        font-weight: bold;
        padding: 10px;
    }

    @media (max-width: 600px) {
        summary {
            font-size: 16px;
        }

        table {
            font-size: 13px;
        }

        th {
            width: 35%;
        }

        th, td {
            padding: 7px;
        }
    }
</style>
</head>

<body>

<div class="container">

    <details open>
        <summary id="title">Memuat informasi produk...</summary>

        <table>
            <tr>
                <th>Produk</th>
                <td id="produk"></td>
            </tr>

            <tr>
                <th>Versi</th>
                <td id="versi"></td>
            </tr>

            <tr>
                <th>Deskripsi</th>
                <td id="deskripsi"></td>
            </tr>

            <tr>
                <th>Periode GIF</th>
                <td id="periode"></td>
            </tr>

            <tr>
                <th>Waktu Awal</th>
                <td id="awal"></td>
            </tr>

            <tr>
                <th>Waktu Akhir</th>
                <td id="akhir"></td>
            </tr>

            <tr>
                <th>Resolusi</th>
                <td id="resolusi"></td>
            </tr>

            <tr>
                <th>Frekuensi Update</th>
                <td id="update"></td>
            </tr>

            <tr>
                <th>Sumber Data</th>
                <td id="sumber"></td>
            </tr>

            <tr>
                <th>Download Data Jam-jaman</th>
                <td>
                    <a id="download" class="download-link" target="_blank" rel="noopener">
                        Memuat link download...
                    </a>
                </td>
            </tr>
        </table>
    </details>

    <div id="error" class="error"></div>

    <div class="gif-wrapper">
        <img id="viewer" alt="Animasi GSMaP">
    </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const file = params.get("file") || "now.gif";

const gifPath = "../../gif/" + file;
const metadataPath = "../../metadata/gif.json";

document.getElementById("viewer").src = gifPath;

document.getElementById("viewer").onerror = function() {
    document.getElementById("error").textContent =
        "File GIF tidak ditemukan: " + file;
};

fetch(metadataPath)
    .then(response => response.json())
    .then(data => {
        const item = data[file];

        if (!item) {
            document.getElementById("error").textContent =
                "Metadata tidak ditemukan untuk file: " + file;
            document.getElementById("title").textContent =
                "Informasi produk tidak tersedia";
            return;
        }

        document.getElementById("title").textContent =
            item.title || "Informasi Produk";

        document.getElementById("produk").textContent =
            item.title || "-";

        document.getElementById("versi").textContent =
            item.version || "-";

        document.getElementById("deskripsi").textContent =
            item.description || "-";

        document.getElementById("periode").textContent =
            item.animation_period || "175 jam terakhir dari data yang tersedia";

        document.getElementById("awal").textContent =
            item.start_time || "-";

        document.getElementById("akhir").textContent =
            item.end_time || "-";

        document.getElementById("resolusi").textContent =
            item.resolution || "-";

        document.getElementById("update").textContent =
            item.update_frequency || "-";

        document.getElementById("sumber").textContent =
            item.source || "-";

        const downloadLink = document.getElementById("download");
        downloadLink.href = item.download_url || "#";
        downloadLink.textContent =
            item.download_name || "Unduh data NetCDF";
    })
    .catch(error => {
        document.getElementById("error").textContent =
            "Gagal memuat metadata gif.json.";
        document.getElementById("title").textContent =
            "Informasi produk tidak tersedia";
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>GSMaP Viewer</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:10px;
    background:white;
}

.container{
    width:100%;
}

/* GIF */

img{
    width:100%;
    height:auto;
    display:block;
    border:1px solid #cccccc;
}

/* Ringkasan */

.summary-box{
    margin-top:12px;
    padding:15px;
    border:1px solid #d9d9d9;
    border-radius:8px;
    background:#fafafa;
}

.summary-box h2{
    margin-top:0;
    margin-bottom:10px;
    color:#004b8d;
}

.summary-item{
    margin:6px 0;
}

/* Tombol download */

.download-btn{
    display:inline-block;
    margin-top:12px;
    padding:10px 15px;
    background:#0056b3;
    color:white;
    text-decoration:none;
    border-radius:5px;
    font-weight:bold;
}

.download-btn:hover{
    background:#004090;
}

/* Accordion */

details{
    margin-top:15px;
    border:1px solid #d9d9d9;
    border-radius:8px;
}

summary{
    padding:12px;
    font-weight:bold;
    cursor:pointer;
    color:#004b8d;
}

/* Tabel */

table{
    width:100%;
    border-collapse:collapse;
}

th,
td{
    border-top:1px solid #e0e0e0;
    padding:10px;
    text-align:left;
    vertical-align:top;
}

th{
    width:220px;
    background:#f5f5f5;
}

.error{
    color:red;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

    <!-- GIF -->

    <img id="viewer" alt="GSMaP Animation">

    <!-- Ringkasan -->

    <div class="summary-box">

        <h2 id="title">Memuat...</h2>

        <div class="summary-item">
            <strong>Periode Animasi:</strong>
            <span id="periode">-</span>
        </div>

        <div class="summary-item">
            <strong>Waktu Data:</strong>
            <span id="awal">-</span>
            s.d.
            <span id="akhir">-</span>
        </div>

        <div class="summary-item">
            <strong>Deskripsi:</strong>
            <span id="deskripsi-singkat">-</span>
        </div>

        <a
            id="download"
            class="download-btn"
            target="_blank"
            rel="noopener noreferrer">
            Unduh Data NetCDF
        </a>

    </div>

    <!-- Detail -->

    <details open>

        <summary>Informasi Produk</summary>

        <table>

            <tr>
                <th>Produk</th>
                <td id="produk">-</td>
            </tr>

            <tr>
                <th>Versi</th>
                <td id="versi">-</td>
            </tr>

            <tr>
                <th>Deskripsi Lengkap</th>
                <td id="deskripsi">-</td>
            </tr>

            <tr>
                <th>Periode GIF</th>
                <td id="periode2">-</td>
            </tr>

            <tr>
                <th>Waktu Awal</th>
                <td id="awal2">-</td>
            </tr>

            <tr>
                <th>Waktu Akhir</th>
                <td id="akhir2">-</td>
            </tr>

            <tr>
                <th>Resolusi</th>
                <td id="resolusi">-</td>
            </tr>

            <tr>
                <th>Frekuensi Update</th>
                <td id="update">-</td>
            </tr>

            <tr>
                <th>Sumber Data</th>
                <td id="sumber">-</td>
            </tr>

        </table>

    </details>

</div>

<script>

/* nama file gif dari URL */
const params = new URLSearchParams(window.location.search);
const file = params.get("file") || "now.gif";

/* tampilkan GIF */

const viewer = document.getElementById("viewer");

viewer.src = "../../gif/" + file;

viewer.onerror = function(){

    document.getElementById("title").textContent =
        "GIF tidak ditemukan";

    console.error(
        "GIF tidak ditemukan:",
        "../../gif/" + file
    );

};

/* baca metadata */

fetch("../../metadata/gif.json")

.then(response => {

    if(!response.ok){
        throw new Error(
            "HTTP Error " + response.status
        );
    }

    return response.json();

})

.then(data => {

    console.log("Metadata:", data);

    const item = data[file];

    if(!item){

        document.getElementById("title").textContent =
            "Metadata tidak ditemukan";

        console.error(
            "Tidak ada metadata untuk:",
            file
        );

        return;
    }

    document.getElementById("title").textContent =
        item.title || "-";

    document.getElementById("periode").textContent =
        item.animation_period || "-";

    document.getElementById("awal").textContent =
        item.start_time || "-";

    document.getElementById("akhir").textContent =
        item.end_time || "-";

    document.getElementById("deskripsi-singkat").textContent =
        item.summary || item.description || "-";

    const downloadBtn =
        document.getElementById("download");

    downloadBtn.href =
        item.download_url || "#";

    downloadBtn.textContent =
        item.download_name ||
        "Unduh Data NetCDF";

    document.getElementById("produk").textContent =
        item.title || "-";

    document.getElementById("versi").textContent =
        item.version || "-";

    document.getElementById("deskripsi").textContent =
        item.description || "-";

    document.getElementById("periode2").textContent =
        item.animation_period || "-";

    document.getElementById("awal2").textContent =
        item.start_time || "-";

    document.getElementById("akhir2").textContent =
        item.end_time || "-";

    document.getElementById("resolusi").textContent =
        item.resolution || "-";

    document.getElementById("update").textContent =
        item.update_frequency || "-";

    document.getElementById("sumber").textContent =
        item.source || "-";

})

.catch(error => {

    console.error(
        "Gagal membaca gif.json",
        error
    );

    document.getElementById("title").innerHTML =
        '<span class="error">Gagal memuat metadata</span>';

    document.getElementById("deskripsi-singkat").textContent =
        error.message;

});

</script>

</body>
</html>

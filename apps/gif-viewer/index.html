<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>GSMaP Viewer</title>

<style>

body{
    font-family: Arial, sans-serif;
    max-width: 1200px;
    margin:auto;
    padding:20px;
}

details{
    border:1px solid #cccccc;
    border-radius:8px;
    margin-bottom:20px;
    background:#f8f8f8;
}

summary{
    cursor:pointer;
    padding:15px;
    font-size:20px;
    font-weight:bold;
    color:#004b8d;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    border:1px solid #d0d0d0;
    padding:10px;
    text-align:left;
}

th{
    width:220px;
    background:#f1f1f1;
}

img{
    width:100%;
    height:auto;
    border:1px solid #d0d0d0;
    border-radius:8px;
}

.download-link{
    font-weight:bold;
    color:#0066cc;
}

</style>
</head>

<body>

<details open>

<summary id="title">
Memuat informasi...
</summary>

<table>

<tr>
<th>Produk</th>
<td id="produk"></td>
</tr>

<tr>
<th>Periode GIF</th>
<td id="periode"></td>
</tr>

<tr>
<th>Waktu Awal</th>
<td id="awal"></td>
</tr>

<tr>
<th>Waktu Akhir</th>
<td id="akhir"></td>
</tr>

<tr>
<th>Deskripsi</th>
<td id="deskripsi"></td>
</tr>

<tr>
<th>Sumber Data</th>
<td id="sumber"></td>
</tr>

<tr>
<th>Download Data</th>
<td>
<a id="download" target="_blank"
class="download-link">
Unduh NetCDF
</a>
</td>
</tr>

</table>

</details>

<img id="viewer">

<script>

const params = new URLSearchParams(window.location.search);

const file = params.get("file") || "now.gif";

document.getElementById("viewer").src =
"../../gif/" + file;

fetch("../../metadata/gif.json")
.then(response => response.json())
.then(data => {

const item = data[file];

if (!item) return;

document.getElementById("title").textContent =
item.title;

document.getElementById("produk").textContent =
item.title;

document.getElementById("periode").textContent =
item.animation_period;

document.getElementById("awal").textContent =
item.start_time;

document.getElementById("akhir").textContent =
item.end_time;

document.getElementById("deskripsi").textContent =
item.description;

document.getElementById("sumber").textContent =
item.source;

document.getElementById("download").href =
item.download_url;

document.getElementById("download").textContent =
item.download_name;

});

</script>

</body>
</html>

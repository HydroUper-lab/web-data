<!DOCTYPE html>
<html>
<body>

<h2 id="stasiun">Loading...</h2>
<h1 id="hujan">Loading...</h1>

<script>

fetch("data/hujan.json")
.then(r => r.json())
.then(data => {

    document.getElementById("stasiun").innerText =
        data.stasiun;

    document.getElementById("hujan").innerText =
        data.hujan_hari_ini + " mm";

});

</script>

</body>
</html>
